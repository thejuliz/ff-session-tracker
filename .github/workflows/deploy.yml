name: Build & Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT || 22 }}
          script: |
            mkdir -p ~/ff-session-tracker
            cd ~/ff-session-tracker
            cat > docker-compose.yml << 'EOF'
            version: "3.8"
            services:
              ff-session-tracker:
                image: ghcr.io/${{ github.repository }}:latest
                restart: unless-stopped
                ports:
                  - "3002:3001"
                volumes:
                  - ./data:/app/data
            EOF
            docker compose pull
            docker compose down --remove-orphans
            docker compose up -d
            docker image prune -f

            # Configure nginx reverse proxy for /ff
            if ! grep -rq "location /ff/" /etc/nginx/ 2>/dev/null; then
              NGINX_FILE=$(grep -rl "location /nina" /etc/nginx/sites-enabled/ /etc/nginx/conf.d/ 2>/dev/null | head -1)
              if [ -n "$NGINX_FILE" ]; then
                awk '/location \/nina/{print "    location /ff/ {"; print "        proxy_pass http://127.0.0.1:3002/;"; print "        proxy_http_version 1.1;"; print "        proxy_set_header Upgrade $http_upgrade;"; print "        proxy_set_header Connection '"'"'upgrade'"'"';"; print "        proxy_set_header Host $host;"; print "        proxy_set_header X-Real-IP $remote_addr;"; print "        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;"; print "        proxy_set_header X-Forwarded-Proto $scheme;"; print "    }"; print ""} {print}' "$NGINX_FILE" > /tmp/nginx-new.conf && mv /tmp/nginx-new.conf "$NGINX_FILE"
                echo "nginx config updated"
              fi
            fi
            nginx -t && systemctl reload nginx
            echo "Deployed successfully!"
